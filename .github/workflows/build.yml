name: Build

on:
  push:
    branches:
      - develop
      - master
      - main
  pull_request:
    branches:
      - develop
      - master
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore TataruHelper.sln

      - name: Build
        run: dotnet build TataruHelper.sln -c Release --no-restore

      - name: Test
        run: dotnet test TataruHelper.sln -c Release --no-build

      - name: Dependency vulnerabilities
        shell: pwsh
        run: |
          dotnet list TataruHelper.sln package --vulnerable --include-transitive
